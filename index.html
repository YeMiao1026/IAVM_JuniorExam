<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iPAS 題庫列印中心</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #1d2a3a;
      --muted: #5f6f84;
      --line: #d8e1ee;
      --accent: #1f5faa;
      --accent2: #2f7de0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px 42px;
    }

    .hero {
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 22px 20px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px 0;
      color: var(--accent);
      font-size: 30px;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 22px rgba(20, 41, 71, 0.06);
    }

    .card h2 {
      margin: 0 0 8px 0;
      font-size: 20px;
      color: #214c85;
    }

    .meta {
      margin: 0 0 12px 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 700;
      border: 1px solid var(--accent2);
      background: linear-gradient(180deg, var(--accent2), var(--accent));
      color: #fff;
      margin-right: 8px;
      margin-bottom: 6px;
    }

    .btn.secondary {
      background: #fff;
      color: #295890;
      border-color: #b8cce6;
      font-weight: 600;
    }

    .hint {
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
      background: #fff;
      border: 1px dashed #c5d3e6;
      border-radius: 10px;
      padding: 10px 12px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>iPAS 題庫列印中心</h1>
      <p class="sub">請先點選科目進入題庫頁，再使用頁面上的「列印 / 另存 PDF」。</p>
    </section>

    <section class="grid">
      <article class="card">
        <h2>無形資產評價概論(一)</h2>
        <p class="meta">已整理為列印版，含題目圖片排版。<br>資料檔：yamol_questions.csv</p>
        <a class="btn" href="yamol_book_print.html">開啟題庫頁</a>
        <a class="btn secondary" href="yamol_questions.csv">下載 CSV</a>
      </article>

      <article class="card">
        <h2>智慧財產概論及評價職業道德</h2>
        <p class="meta">已整理為列印版，含題目圖片排版。<br>資料檔：yamol_questions_6253.csv</p>
        <a class="btn" href="yamol_book_print_6253.html">開啟題庫頁</a>
        <a class="btn secondary" href="yamol_questions_6253.csv">下載 CSV</a>
      </article>
    </section>

    <div class="hint">
      建議列印設定：A4、縮放 100%、邊界「無」或「最小」。
    </div>
  </main>
</body>
</html>
